<!DOCTYPE html>

<body>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">

      </svg>
      <span class="nav-logo-text">KZ<span>plus</span></span>

    <ul class="nav-links">
      <li><a href="about.html">About Us</a></li>
      <li><a href="partners.html">Partners</a></li>
      <li><a href="forum.html" class="nav-forum-link">Forum</a></li>

      <div class="nav-dropdown hidden" id="navDropdown">
        <div class="nav-dropdown-info">
          <img id="navDropdownAvatar" src="" alt="" class="nav-dropdown-avatar" />

        <div class="nav-dropdown-divider"></div>

        </a>

    </div>

  <div class="thread-page">
    <a class="thread-back" href="forum.html">

    <div id="threadPost"><div class="forum-loading">Loading…</div></div>

    <!-- Replies -->
    <div class="replies-header" id="repliesHeader" style="display:none">Replies</div>
    <div id="repliesList"></div>

    <!-- Reply composer -->
    <div id="replyComposer"></div>
  </div>

  <script src="auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="forum.js"></script>
