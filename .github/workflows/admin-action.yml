name: Admin Action

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: move or remove'
        required: true
      steamid:
        description: 'Steam ID64'
        required: true
      country:
        description: 'Country code (for move only)'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run action
        run: |
          if [ "${{ github.event.inputs.action }}" = "move" ]; then
            node scripts/move-player-country.js "${{ github.event.inputs.steamid }}" "${{ github.event.inputs.country }}"
          elif [ "${{ github.event.inputs.action }}" = "remove" ]; then
            node scripts/admin-remove.js "${{ github.event.inputs.steamid }}"
          fi

      - name: Commit results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add cache/
          git diff --staged --quiet || git commit -m "admin: ${{ github.event.inputs.action }} ${{ github.event.inputs.steamid }}"
          git pull --rebase=false origin main
          git push origin HEAD:main
