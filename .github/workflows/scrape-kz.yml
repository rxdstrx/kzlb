name: Scrape KZ Stats

on:
  workflow_dispatch:
    inputs:
      steamid:
        description: 'Steam ID64'
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-scraper-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-scraper-

      - name: Install dependencies
        run: |
          if [ ! -d "node_modules/puppeteer-core" ]; then
            npm install puppeteer-core @sparticuz/chromium puppeteer-extra puppeteer-extra-plugin-stealth
          else
            echo "Using cached node_modules"
          fi

      - name: Scrape stats
        run: node scripts/scrape.js ${{ github.event.inputs.steamid }}

      - name: Commit cache
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git fetch origin main
          git checkout origin/main -- . 2>/dev/null || true
          git add cache/
          git diff --staged --quiet || git commit -m "cache: ${{ github.event.inputs.steamid }}"
          git push origin HEAD:main
