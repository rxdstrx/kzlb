name: Scrape KZ Stats

on:
  workflow_dispatch:
    inputs:
      steamid:
        description: 'Steam ID64'
        required: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-scraper-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-scraper-

      - name: Install Python deps
        run: pip install curl_cffi

      - name: Install dependencies
        run: |
          if [ ! -d "node_modules" ]; then
            npm install
          else
            echo "Using cached node_modules"
          fi

      - name: Scrape stats
        run: node scripts/scrape.js ${{ github.event.inputs.steamid }}
        env:
          CYBERSHOKE_COOKIE: ${{ secrets.CYBERSHOKE_COOKIE }}

      - name: Commit cache
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add cache/
          git diff --staged --quiet || git commit -m "cache: ${{ github.event.inputs.steamid }}"
          git pull --rebase=false --strategy-option=ours origin main
          git push origin HEAD:main

      - name: Purge jsDelivr cache
        run: |
          STEAMID="${{ github.event.inputs.steamid }}"
          BASE="https://purge.jsdelivr.net/gh/rxdstrx/kzlb@main/cache"
          curl -s "$BASE/${STEAMID}.json" &
          curl -s "$BASE/world-kz-players.json" &
          wait
