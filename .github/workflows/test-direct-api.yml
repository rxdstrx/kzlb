name: Test Direct Cybershoke API

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Test direct API (no Puppeteer)
        env:
          CYBERSHOKE_COOKIE: ${{ secrets.CYBERSHOKE_COOKIE }}
        run: node scripts/test-direct-api.js 76561198842886915
