name: Add Player to Leaderboard

on:
  workflow_dispatch:
    inputs:
      steamid:
        description: 'Steam ID64 (17 digits)'
        required: true
      country:
        description: 'Country code (e.g. pt, es, fr)'
        required: true
        default: 'pt'
      nickname:
        description: 'Nickname (optional, auto-detected if blank)'
        required: false
        default: ''

jobs:
  add:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-scraper-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-scraper-

      - name: Install dependencies
        run: |
          if [ ! -d "node_modules/puppeteer-core" ]; then
            npm install puppeteer-core @sparticuz/chromium puppeteer-extra puppeteer-extra-plugin-stealth
          else
            echo "Using cached node_modules"
          fi

      - name: Add player to leaderboard
        run: node scripts/add-player.js "${{ github.event.inputs.steamid }}" "${{ github.event.inputs.country }}" "${{ github.event.inputs.nickname }}"

      - name: Commit results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add cache/
          git diff --staged --quiet || git commit -m "add player: ${{ github.event.inputs.steamid }} (${{ github.event.inputs.country }})"
          git pull --rebase=false --strategy-option=ours origin main
          git push origin HEAD:main
