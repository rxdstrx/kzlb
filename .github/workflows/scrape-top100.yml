name: Scrape Top 100 KZ

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'  # runs daily at 6am UTC to keep top 100 fresh

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-scraper-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-scraper-

      - name: Install dependencies
        run: |
          if [ ! -d "node_modules/puppeteer-core" ]; then
            npm install puppeteer-core @sparticuz/chromium puppeteer-extra puppeteer-extra-plugin-stealth
          else
            echo "Using cached node_modules"
          fi

      - name: Scrape top 100 KZ players
        env:
          FACEIT_KEY: ${{ secrets.FACEIT_KEY }}
          CYBERSHOKE_COOKIE: ${{ secrets.CYBERSHOKE_COOKIE }}
        run: node scripts/scrape-top100.js

      - name: Commit results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add cache/
          git diff --staged --quiet || git commit -m "scrape: update top 100 KZ players"
          git pull --rebase=false origin main
          node scripts/rebuild-world.js
          git add cache/world-kz-players.json
          git diff --staged --quiet || git commit -m "rebuild world after top100 scrape"
          git push origin HEAD:main
