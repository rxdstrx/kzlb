name: Scan PT Players

on:
  workflow_dispatch:
    inputs:
      how_many:
        description: 'How many new players to fetch and scrape (e.g. 100 to test, 5000 for full batch)'
        required: true
        default: '100'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-scraper-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-scraper-

      - name: Install dependencies
        run: |
          if [ ! -d "node_modules/puppeteer-core" ]; then
            npm install puppeteer-core @sparticuz/chromium puppeteer-extra puppeteer-extra-plugin-stealth
          else
            echo "Using cached node_modules"
          fi

      - name: Fetch & scrape new PT players
        env:
          FACEIT_KEY: ${{ secrets.FACEIT_KEY }}
          CYBERSHOKE_COOKIE: ${{ secrets.CYBERSHOKE_COOKIE }}
        run: node scripts/scan-new-pt.js ${{ github.event.inputs.how_many }}

      - name: Normalize place totals
        run: node scripts/normalize-place-totals.js

      - name: Commit results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add cache/
          git diff --staged --quiet || git commit -m "scan PT: ${{ github.event.inputs.how_many }} new players"
          git pull --rebase=false origin main
          node scripts/rebuild-world.js
          git add cache/world-kz-players.json
          git diff --staged --quiet || git commit -m "rebuild world after PT scan"
          git push origin HEAD:main
