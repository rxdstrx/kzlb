<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KZ — Player Profile</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="maps.css" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <!-- Loading state -->
  <div class="profile-loading" id="loadingState">
    <div class="progress-ring-wrap">
      <svg class="progress-ring" width="100" height="100" viewBox="0 0 100 100">
        <circle class="progress-ring-bg" cx="50" cy="50" r="42"/>
        <circle class="progress-ring-fill" id="progressCircle" cx="50" cy="50" r="42"/>
      </svg>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <p class="loading-step" id="loadingStep">Connecting…</p>
    <p class="loading-sub" id="loadingSub">This takes about 60 seconds</p>
    <a class="cybershoke-btn hidden" id="loadingCybershokeLink" href="#" target="_blank" rel="noopener" style="margin-top:16px">
      View on Cybershoke
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
        <path d="M2 9L9 2M9 2H4M9 2V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
  </div>

  <!-- Error state -->
  <div class="profile-error hidden" id="errorState">
    <p id="errorMsg">Could not load profile.</p>
    <a href="#" onclick="history.back(); return false;" class="back-btn" style="margin-top:16px">← Go back</a>
  </div>

  <!-- Profile content -->
  <div class="profile-content hidden" id="profileContent">

    <!-- Back button -->
    <div class="profile-back-wrap">
      <a class="back-btn" href="#" onclick="history.back(); return false;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </a>
    </div>

    <!-- ── BANNER ── -->
    <div class="profile-banner-container">
      <div class="profile-banner" id="profileBanner">
        <div class="banner-overlay"></div>
        <!-- Drop zone hint (owner only, shown when dragging) -->
        <div class="banner-drop-hint hidden" id="bannerDropHint">Drop image here</div>
        <!-- Owner-only controls -->
        <div class="banner-owner-controls hidden" id="bannerOwnerControls">
          <button class="banner-edit-btn" id="bannerEditBtn">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M9.5 1.5L11.5 3.5L4.5 10.5H2.5V8.5L9.5 1.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
            </svg>
            Change Banner
          </button>
          <button class="banner-remove-btn hidden" id="bannerRemoveBtn">Remove</button>
          <!-- Hidden file input -->
          <input type="file" id="bannerFileInput" accept="image/*" style="display:none" />
        </div>
      </div>
    </div>

    <!-- ── PROFILE HEADER ── -->
    <div class="profile-header-wrap">
      <div class="profile-header">
        <div class="profile-avatar-outer">
          <img class="profile-avatar-lg" id="playerAvatar" src="" alt="avatar" />
        </div>
        <div class="profile-header-info">
          <div class="profile-name-row">
            <h1 class="profile-name" id="playerName">—</h1>
            <span class="profile-flag" id="playerFlag"></span>
          </div>
          <div class="profile-steamid" id="playerSteamId">—</div>
          <div class="profile-lastseen" id="profileLastSeen"></div>
          <div class="profile-socials">
            <!-- Steam -->
            <a class="social-icon-btn" id="steamSocialLink" href="#" target="_blank" rel="noopener" title="Steam Profile">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.455 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.253 0-2.265-1.014-2.265-2.265z"/>
              </svg>
            </a>
            <!-- Faceit -->
            <a class="social-icon-btn faceit-btn hidden" id="faceitSocialLink" href="#" target="_blank" rel="noopener" title="Faceit Profile">
              <img src="https://cdn.simpleicons.org/faceit/FF5500" width="18" height="18" alt="Faceit" style="display:block" />
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ── STATS BAR ── -->
    <div class="profile-stats-bar">
      <div class="stat-card">
        <div class="stat-card-value" id="statWorldRank">—</div>
        <div class="stat-card-label">World Rank</div>
      </div>
      <div class="stat-card-sep"></div>
      <div class="stat-card">
        <div class="stat-card-value" id="statCountryDisplay">—</div>
        <div class="stat-card-label">Country</div>
      </div>
      <div class="stat-card-sep"></div>
      <div class="stat-card">
        <div class="stat-card-value" id="statFaceitElo">—</div>
        <div class="stat-card-label">Faceit ELO</div>
      </div>
      <div class="stat-card-sep"></div>
      <div class="stat-card">
        <div class="stat-card-value" id="statPoints">—</div>
        <div class="stat-card-label">KZ Points</div>
      </div>
      <div class="stat-card-sep"></div>
      <div class="stat-card">
        <div class="stat-card-value" id="statMaps">—</div>
        <div class="stat-card-label">Maps Done</div>
      </div>
    </div>

    <!-- ── ACTIONS BAR ── -->
    <div class="profile-actions-bar">
      <div class="profile-actions-left">
        <a class="action-btn action-cybershoke" id="cybershokeLink" href="#" target="_blank" rel="noopener">
          View on Cybershoke
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
            <path d="M2 9L9 2M9 2H4M9 2V7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <button class="action-btn action-update" id="updateRecordBtn">Update Records</button>
      </div>
      <div class="profile-actions-right">
        <!-- Own profile only -->
        <div class="own-profile-actions hidden" id="ownProfileActions">
          <div class="flag-change-wrap">
            <select class="flag-change-select" id="flagChangeSelect"></select>
            <button class="flag-change-btn" id="flagChangeBtn">Save Flag</button>
            <span class="flag-change-status hidden" id="flagChangeStatus"></span>
          </div>
          <button class="steam-logout-btn" id="steamLogoutBtn">Log out</button>
        </div>
        <a class="steam-login-btn hidden" id="steamLoginBtn" href="login.html">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="opacity:.7">
            <path d="M12 0C5.373 0 0 5.373 0 12l6.39 2.647A3.37 3.37 0 0 1 9 14.25a3.375 3.375 0 0 1 3.375-3.375l2.894-4.122A4.5 4.5 0 1 1 19.5 11.25a4.488 4.488 0 0 1-2.36-.67L13.5 13.5a3.375 3.375 0 1 1-6.11 1.875L2.042 13.42C3.076 19.385 7.983 24 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0z"/>
          </svg>
          Login with Steam
        </a>
      </div>
    </div>

    <!-- Update status -->
    <div class="update-record-status hidden" id="updateRecordStatus"></div>

    <!-- Cached note -->
    <p class="cached-at-note" id="cachedAt"></p>

    <!-- ── MAPS TABLE ── -->
    <div class="table-wrapper" id="statsTable" style="margin-top:8px">
      <table>
        <thead>
          <tr>
            <th class="col-mapname">Map</th>
            <th class="col-tier-sm">Tier</th>
            <th>Runs</th>
            <th>Time</th>
            <th>Position</th>
            <th class="col-date">Date</th>
          </tr>
        </thead>
        <tbody id="statsBody"></tbody>
      </table>
      <div class="empty-state hidden" id="noStats">No completed maps found.</div>
    </div>

  </div>

  <script src="maps-data.js"></script>
  <script src="auth.js"></script>
  <script>document.write('<script src="profile.js?v=' + Date.now() + '"><\/script>')</script>
</body>
</html>
