<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KZ Leaderboard — Maps</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="maps.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="container">
    <header>
      <a class="back-btn" href="index.html">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </a>
      <h1 class="title">KZ <span>Maps</span></h1>
      <p class="subtitle">Map Records</p>
    </header>

    <div class="maps-loading" id="mapsLoading">
      <div class="spinner"></div>
      <p>Loading map stats…</p>
    </div>

    <div class="table-wrapper hidden" id="mapsTableWrap">
      <table>
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th class="col-mapname">Map</th>
            <th class="col-tier">Tier</th>
            <th class="col-completions"><span class="th-icon-cell"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Completions</span></th>
            <th class="col-record"><span class="th-icon-cell"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Record</span></th>
            <th class="col-yourtime"><span class="th-icon-cell"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>Your time</span></th>
            <th class="col-avgtime"><span class="th-icon-cell"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Avg time</span></th>
          </tr>
        </thead>
        <tbody id="maps-body"></tbody>
      </table>
    </div>
  </div>

  <script src="maps-data.js"></script>
  <script src="maps.js"></script>
</body>
</html>
