<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KZ Leaderboard — Maps</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="maps.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="container">
    <header>
      <a class="back-btn" href="index.html">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back
      </a>
      <h1 class="title">KZ <span>Maps</span></h1>
      <p class="subtitle">Map Records</p>
    </header>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th class="col-mapname">Map</th>
            <th class="col-tier">Tier</th>
            <th class="col-time">Time</th>
          </tr>
        </thead>
        <tbody id="maps-body"></tbody>
      </table>
    </div>
  </div>

  <script src="maps-data.js"></script>
  <script src="maps.js"></script>
</body>
</html>
