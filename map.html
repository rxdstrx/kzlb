<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KZ — Map Records</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="maps.css" />
  <link rel="stylesheet" href="profile.css" />
  <link rel="stylesheet" href="portugal.css" />
  <link rel="stylesheet" href="friends.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="container">
    <a class="back-btn" href="javascript:history.back()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>

    <!-- Map header -->
    <div class="map-page-header" id="mapHeader">
      <img class="map-page-thumb" id="mapThumb" src="" alt="" style="display:none" />
      <div class="map-page-info">
        <div class="map-page-top">
          <span class="tier-badge" id="mapTierBadge">T—</span>
          <h1 class="map-page-title" id="mapTitle">—</h1>
        </div>
        <p class="pt-sub" id="mapSub">Loading records…</p>
      </div>
    </div>

    <!-- Map stats bar -->
    <span class="map-page-section-pill hidden" id="mapStatsPill">Map Stats</span>
    <div class="map-stats-bar hidden" id="mapStatsBar">
      <div class="map-stat-card">
        <div class="map-stat-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="map-stat-body">
          <div class="map-stat-label">Unique completions</div>
          <div class="map-stat-value" id="statCompletions">—</div>
        </div>
      </div>
      <div class="map-stat-card">
        <div class="map-stat-icon map-stat-icon-wr">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div class="map-stat-body">
          <div class="map-stat-label">Record</div>
          <div class="map-stat-value" id="statRecord">—</div>
          <div class="map-stat-sub" id="statRecordHolder"></div>
        </div>
      </div>
      <div class="map-stat-card" id="statYourTimeCard">
        <div class="map-stat-icon map-stat-icon-you">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="map-stat-body">
          <div class="map-stat-label">Your time</div>
          <div class="map-stat-value" id="statYourTime">—</div>
          <div class="map-stat-sub" id="statYourRank"></div>
        </div>
      </div>
      <div class="map-stat-card">
        <div class="map-stat-icon map-stat-icon-avg">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div class="map-stat-body">
          <div class="map-stat-label">Average time</div>
          <div class="map-stat-value" id="statAvgTime">—</div>
        </div>
      </div>
    </div>

    <!-- Country filter -->
    <div class="map-country-filter">
      <button class="map-all-btn active" id="mapAllBtn">🌍 All</button>
      <div class="map-country-dropdown-wrap" id="mapCountryDropdownWrap">
        <button class="map-country-btn" id="mapCountryBtn">Country ▾</button>
        <div class="map-country-list hidden" id="mapCountryList">
          <div class="map-country-search-wrap">
            <input class="map-country-search" id="mapCountrySearch" type="text" placeholder="Search country..." autocomplete="off" />
          </div>
          <div id="mapCountryOptions"></div>
        </div>
      </div>
    </div>

    <!-- Role filter bar -->
    <div class="role-filter-bar" id="roleFilterBarMap" style="display:none">
      <span class="role-filter-label">Show:</span>
      <button class="role-filter-btn active" data-role="all">All Players</button>
    </div>

    <!-- Loading -->
    <div class="profile-loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading records…</p>
    </div>

    <!-- Table -->
    <div class="table-wrapper hidden" id="tableWrapper" style="margin-top:16px">
      <table>
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th>Player</th>
            <th>Time</th>
            <th>Global Position</th>
            <th>Runs</th>
          </tr>
        </thead>
        <tbody id="mapBody"></tbody>
      </table>
      <div class="empty-state hidden" id="noData">No records found for this map.</div>
      <div id="pagination"></div>
    </div>
  </div>

  <style>
    .map-page-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(24px);
    }
    .map-page-thumb {
      width: 100px;
      height: 100px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .map-page-info { flex: 1; }
    .map-page-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .map-page-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f0f5;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .map-country-filter {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .map-filter-label { font-size: 0.8rem; color: rgba(255,255,255,0.35); }
    .map-all-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .map-all-btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .map-all-btn.active {
      background: rgba(129,140,248,0.2);
      border-color: rgba(129,140,248,0.4);
      color: #a5b4fc;
    }
    .map-country-dropdown-wrap { position: relative; }
    .map-country-btn {
      padding: 6px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .map-country-btn:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .map-country-btn.active {
      background: rgba(129,140,248,0.2);
      border-color: rgba(129,140,248,0.4);
      color: #a5b4fc;
    }
    .map-country-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 200;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 6px;
      min-width: 200px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .map-country-list.hidden { display: none; }
    .map-country-search-wrap {
      padding: 4px 4px 6px;
    }
    .map-country-search {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 0.82rem;
      padding: 6px 10px;
      outline: none;
    }
    .map-country-search::placeholder { color: rgba(255,255,255,0.35); }
    .map-country-search:focus { border-color: rgba(129,140,248,0.5); }
    #mapCountryOptions {
      max-height: 220px;
      overflow-y: auto;
    }
    .map-country-option {
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      transition: background 0.1s;
      white-space: nowrap;
    }
    .map-country-option:hover { background: rgba(255,255,255,0.08); color: #fff; }
  </style>

  <script src="maps-data.js"></script>
  <script src="auth.js"></script>
  <script src="map.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="friends.js"></script>
</body>
</html>
