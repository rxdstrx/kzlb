<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KZ — Map Records</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="maps.css" />
  <link rel="stylesheet" href="profile.css" />
  <link rel="stylesheet" href="portugal.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div class="container">
    <a class="back-btn" href="javascript:history.back()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Back
    </a>

    <!-- Map header -->
    <div class="map-page-header" id="mapHeader">
      <img class="map-page-thumb" id="mapThumb" src="" alt="" style="display:none" />
      <div class="map-page-info">
        <div class="map-page-top">
          <span class="tier-badge" id="mapTierBadge">T—</span>
          <h1 class="map-page-title" id="mapTitle">—</h1>
        </div>
        <p class="pt-sub" id="mapSub">Loading records…</p>
      </div>
    </div>

    <!-- Country filter -->
    <div class="map-country-filter">
      <span class="map-filter-label">Country:</span>
      <div class="map-country-chips" id="countryChips">
        <div class="map-country-chip active" data-country="all">🌍 All</div>
        <div class="map-country-chip" data-country="pt">🇵🇹 Portugal</div>
      </div>
    </div>

    <!-- Loading -->
    <div class="profile-loading" id="loadingState">
      <div class="spinner"></div>
      <p>Loading records…</p>
    </div>

    <!-- Table -->
    <div class="table-wrapper hidden" id="tableWrapper" style="margin-top:16px">
      <table>
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th>Player</th>
            <th>Time</th>
            <th>Global Position</th>
            <th>Runs</th>
          </tr>
        </thead>
        <tbody id="mapBody"></tbody>
      </table>
      <div class="empty-state hidden" id="noData">No records found for this map.</div>
      <div id="pagination"></div>
    </div>
  </div>

  <style>
    .map-page-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      padding: 20px 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(24px);
    }
    .map-page-thumb {
      width: 100px;
      height: 100px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .map-page-info { flex: 1; }
    .map-page-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }
    .map-page-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f0f5;
      letter-spacing: -0.02em;
      margin: 0;
    }
    .map-country-filter {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .map-filter-label { font-size: 0.8rem; color: rgba(255,255,255,0.35); }
    .map-country-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .map-country-chip {
      padding: 5px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.12s;
    }
    .map-country-chip:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .map-country-chip.active {
      background: rgba(129,140,248,0.2);
      border-color: rgba(129,140,248,0.4);
      color: #a5b4fc;
    }
  </style>

  <script src="maps-data.js"></script>
  <script src="map.js"></script>
</body>
</html>
