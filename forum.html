<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum — KZplus</title>
  <link rel="stylesheet" href="landing.css" />
  <link rel="stylesheet" href="forum.css" />
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="10" fill="rgba(139,92,246,0.18)"/>
        <text x="4" y="24" font-family="system-ui,sans-serif" font-weight="800" font-size="14" fill="#a855f7">KZ</text>
        <line x1="27" y1="10" x2="27" y2="26" stroke="#a855f7" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="19" y1="18" x2="35" y2="18" stroke="#a855f7" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      <span class="nav-logo-text">KZ<span>plus</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="about.html">About Us</a></li>
      <li><a href="partners.html">Partners</a></li>
      <li><a href="forum.html" class="nav-forum-link">Forum</a></li>
    </ul>
    <a class="nav-steam-login hidden" id="navSteamLogin" href="login.html">Login with Steam</a>
    <div class="nav-avatar-wrap hidden" id="navUser">
      <img id="navUserAvatar" src="" alt="" class="nav-avatar-btn" />
      <div class="nav-dropdown hidden" id="navDropdown">
        <div class="nav-dropdown-info">
          <img id="navDropdownAvatar" src="" alt="" class="nav-dropdown-avatar" />
          <span id="navDropdownName"></span>
        </div>
        <div class="nav-dropdown-divider"></div>
        <a href="#" class="nav-dropdown-item" id="navDropdownProfile">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          Open Profile
        </a>
        <button class="nav-dropdown-item nav-dropdown-logout" id="navLogoutBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Log out
        </button>
      </div>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="forum-page">

    <!-- ── Hero header ── -->
    <div class="forum-hero">
      <div class="forum-hero-left">
        <div class="forum-hero-pill">● KZ FORUM</div>
        <h1 class="forum-hero-title">KZ <em>Community</em></h1>
        <p class="forum-hero-sub">Discuss maps, records, and everything KZ</p>
      </div>
      <div class="forum-hero-right">
        <button class="btn-new-post" id="newPostBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Post
        </button>
      </div>
    </div>

    <!-- ── 2-column layout ── -->
    <div class="forum-layout">

      <!-- LEFT: discussions -->
      <div class="forum-col-main">

        <!-- Category filter row -->
        <div class="forum-cats">
          <button class="forum-cat-btn active" data-cat="all">All</button>
          <button class="forum-cat-btn" data-cat="maps">Maps</button>
          <button class="forum-cat-btn" data-cat="records">Records</button>
          <button class="forum-cat-btn" data-cat="general">General</button>
          <button class="forum-cat-btn" data-cat="help">Help</button>
          <button class="forum-cat-btn" data-cat="off-topic">Off Topic</button>
        </div>

        <!-- Section header -->
        <div class="forum-section-header">
          <span class="forum-section-pill">Discussions</span>
          <span class="forum-section-count" id="threadCount">—</span>
        </div>

        <!-- Thread list -->
        <div class="forum-threads" id="forumThreads">
          <div class="forum-loading">Loading threads…</div>
        </div>

        <div class="forum-load-more-wrap">
          <button class="forum-load-more-btn" id="loadMoreBtn" style="display:none">Load more</button>
        </div>
      </div>

      <!-- RIGHT: sidebar (featured + stats) -->
      <aside class="forum-col-side">

        <!-- Featured / pinned section -->
        <div class="forum-side-section">
          <div class="forum-section-pill">Featured</div>
          <div id="featuredThreads" class="forum-featured-list">
            <div class="forum-loading" style="font-size:0.78rem;padding:20px 0">Loading…</div>
          </div>
        </div>

        <!-- Forum stats -->
        <div class="forum-side-section" style="margin-top:20px">
          <div class="forum-section-pill">Community</div>
          <div class="forum-stats-grid">
            <div class="forum-stat-item">
              <div class="forum-stat-val" id="statPostCount">—</div>
              <div class="forum-stat-lbl">Posts</div>
            </div>
            <div class="forum-stat-item">
              <div class="forum-stat-val" id="statCategoryCount">5</div>
              <div class="forum-stat-lbl">Categories</div>
            </div>
          </div>
        </div>

        <!-- Category legend -->
        <div class="forum-side-section" style="margin-top:20px">
          <div class="forum-section-pill">Categories</div>
          <div class="forum-cat-legend">
            <div class="forum-cat-legend-item cat-maps" data-cat="maps">
              <span class="cat-dot"></span>Maps
            </div>
            <div class="forum-cat-legend-item cat-records" data-cat="records">
              <span class="cat-dot"></span>Records
            </div>
            <div class="forum-cat-legend-item cat-general" data-cat="general">
              <span class="cat-dot"></span>General
            </div>
            <div class="forum-cat-legend-item cat-help" data-cat="help">
              <span class="cat-dot"></span>Help
            </div>
            <div class="forum-cat-legend-item cat-off-topic" data-cat="off-topic">
              <span class="cat-dot"></span>Off Topic
            </div>
          </div>
        </div>

      </aside>
    </div>
  </div>

  <!-- New Post Modal -->
  <div class="forum-modal-overlay" id="newPostModal">
    <div class="forum-modal">
      <div class="forum-modal-header">
        <div class="forum-modal-title">Create a Post</div>
        <button class="forum-modal-close" id="closeModal">✕</button>
      </div>
      <div class="forum-field">
        <label class="forum-label">Category</label>
        <select class="forum-select" id="postCategory">
          <option value="maps">Maps</option>
          <option value="records">Records</option>
          <option value="general">General</option>
          <option value="help">Help</option>
          <option value="off-topic">Off Topic</option>
        </select>
      </div>
      <div class="forum-field">
        <label class="forum-label">Title</label>
        <input class="forum-input" id="postTitle" type="text" placeholder="What's on your mind?" maxlength="120" />
      </div>
      <div class="forum-field">
        <label class="forum-label">Body</label>
        <textarea class="forum-textarea" id="postBody" placeholder="Write something…" maxlength="2000"></textarea>
      </div>
      <div id="postError" style="color:#f87171;font-size:0.78rem;display:none;margin-top:4px"></div>
      <div class="forum-modal-actions">
        <button class="btn-cancel" id="cancelPost">Cancel</button>
        <button class="btn-submit" id="submitPost">Post</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-client.js"></script>
  <script src="forum.js"></script>
</body>
</html>
