[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."kz-stats"]
  timeout = 26

[[redirects]]
  from = "/api/kz-stats"
  to = "/.netlify/functions/kz-stats"
  status = 200

[[redirects]]
  from = "/api/steam-resolve"
  to = "/.netlify/functions/steam-resolve"
  status = 200
